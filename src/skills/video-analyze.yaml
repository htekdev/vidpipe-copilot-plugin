name: video-analyze
description: Analyze video files with Gemini AI for editorial direction, clip opportunities, and enhancement suggestions
trigger_phrases:
  - analyze video
  - video analysis
  - find clips
  - editorial direction
  - enhancement suggestions
  - where to cut
  - pacing analysis

parameters:
  - name: video_path
    type: string
    required: true
    description: Path to the video file to analyze

  - name: analysis_type
    type: string
    required: false
    default: editorial
    enum:
      - editorial
      - clips
      - enhancements
    description: Type of analysis to perform

examples:
  - prompt: "Analyze this video for editing"
    video_path: "./recording.mp4"
    analysis_type: "editorial"

  - prompt: "Find clip opportunities in the video"
    video_path: "./presentation.mp4"
    analysis_type: "clips"

  - prompt: "What visual enhancements would help this video?"
    video_path: "./tutorial.mp4"
    analysis_type: "enhancements"

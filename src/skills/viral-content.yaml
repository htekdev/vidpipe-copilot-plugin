name: viral-content
description: Generate viral content strategy - shorts planning with hooks, engagement scoring, and platform-optimized social media posts
trigger_phrases:
  - plan shorts
  - viral strategy
  - social posts
  - tiktok post
  - youtube shorts
  - instagram reels
  - generate posts
  - content strategy
  - engagement optimization

parameters:
  - name: video_path
    type: string
    required: true
    description: Path to the video file

  - name: operation
    type: string
    required: true
    enum:
      - plan-shorts
      - generate-posts
    description: The content generation operation

  - name: transcript_path
    type: string
    required: false
    description: Path to transcript JSON file (for shorts planning)

  - name: platforms
    type: array
    required: false
    default:
      - tiktok
      - youtube
      - instagram
      - linkedin
      - twitter
    description: Target platforms for post generation

examples:
  - prompt: "Plan shorts for this video"
    video_path: "./recording.mp4"
    operation: "plan-shorts"
    transcript_path: "./transcript.json"

  - prompt: "Generate social media posts"
    video_path: "./clip.mp4"
    operation: "generate-posts"
    platforms:
      - tiktok
      - instagram

  - prompt: "Create a viral content strategy"
    video_path: "./presentation.mp4"
    operation: "plan-shorts"
    transcript_path: "./transcript.json"

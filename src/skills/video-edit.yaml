name: video-edit
description: Perform video editing operations using FFmpeg - cut clips, remove silence, burn captions, generate platform variants
trigger_phrases:
  - cut video
  - trim video
  - extract clip
  - remove silence
  - burn captions
  - add subtitles
  - generate variants
  - platform versions
  - aspect ratio

parameters:
  - name: video_path
    type: string
    required: true
    description: Path to the video file to edit

  - name: operation
    type: string
    required: true
    enum:
      - cut
      - silence-remove
      - burn-captions
      - variants
      - composite
    description: The editing operation to perform

  - name: start
    type: number
    required: false
    description: Start time in seconds (for cut operation)

  - name: end
    type: number
    required: false
    description: End time in seconds (for cut operation)

  - name: captions_file
    type: string
    required: false
    description: Path to ASS/SRT caption file (for burn-captions)

  - name: platforms
    type: array
    required: false
    default:
      - tiktok
      - youtube
      - instagram
    description: Target platforms for variant generation

  - name: output
    type: string
    required: false
    description: Output file path

examples:
  - prompt: "Cut a clip from 10s to 45s"
    video_path: "./recording.mp4"
    operation: "cut"
    start: 10
    end: 45

  - prompt: "Remove silent parts from this video"
    video_path: "./presentation.mp4"
    operation: "silence-remove"

  - prompt: "Burn these captions into the video"
    video_path: "./tutorial.mp4"
    operation: "burn-captions"
    captions_file: "./captions.ass"

  - prompt: "Generate TikTok and YouTube versions"
    video_path: "./clip.mp4"
    operation: "variants"
    platforms:
      - tiktok
      - youtube
